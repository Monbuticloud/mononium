name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly flamegraph profiling
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3

jobs:
  # ── Lint ───────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets 2>&1 | tee clippy_output.txt

      - name: Clippy (tests)
        run: cargo clippy --all-targets --tests 2>&1 | tee clippy_tests_output.txt

  # ── License & Advisory ─────────────────────────────────────────────
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: License + advisory check
        run: cargo deny check

  # ── Test ───────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo nextest run --workspace --profile ci

  # ── Build (release) ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release

      - name: Check binary
        run: ./target/release/monium-cli --help

  # ── Benchmarks ──────────────────────────────────────────────────────
  benches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run criterion benchmarks
        run: cargo bench -p mononium-lib 2>&1 | tee bench_output.txt

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/criterion/
            bench_output.txt
          if-no-files-found: warn

  # ── Flamegraph (Linux perf) ─────────────────────────────────────────
  # Scheduled nightly + manual trigger. Builds the node with debug symbols,
  # profiles it under `perf` for 60s, and uploads the SVG.
  flamegraph:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq linux-tools-common linux-tools-$(uname -r) 2>/dev/null || true
          cargo install inferno --quiet 2>/dev/null

      - name: Build with debug symbols
        run: cargo build --profile flamegraph --bin mononium-cli

      - name: Profile node (60s perf sampling)
        run: |
          # Lower paranoid so perf works (needed on some kernel configs even with sudo)
          sudo sysctl -w kernel.perf_event_paranoid=1 2>/dev/null || true

          # Start node in background (observer mode, no p2p needed)
          ./target/flamegraph/mononium-cli node \
            --observer \
            --genesis configs/genesis.devnet.json \
            --p2p-port 0 \
            --rpc-port 0 \
            --rest-port 0 \
            --log-level error &
          NODE_PID=$!
          echo "Node PID: $NODE_PID"
          sleep 5

          # Verify node is still alive
          if ! kill -0 "$NODE_PID" 2>/dev/null; then
            echo "Node died before sampling!"
            exit 1
          fi

          # Sample with perf for 60 seconds (99 Hz = ~6000 samples)
          echo "Sampling..."
          sudo perf record -F 99 -p "$NODE_PID" -g -o perf.data -- sleep 60 2>&1
          echo "Sampling done."

          # Fix ownership so non-root steps can read perf.data
          sudo chown "$(whoami)" perf.data 2>/dev/null || true

          # Cleanup
          kill "$NODE_PID" 2>/dev/null || true
          wait "$NODE_PID" 2>/dev/null || true

      - name: Generate flamegraph SVG
        run: |
          if [ ! -f perf.data ] || [ ! -s perf.data ]; then
            echo "No perf.data captured — skipping flamegraph"
            mkdir -p flamegraph-output
            echo "No samples captured" > flamegraph-output/status.txt
            exit 0
          fi
          perf script -i perf.data 2>/dev/null | inferno-collapse-perf > stacks.folded 2>/dev/null || true
          wc -l stacks.folded
          if [ ! -s stacks.folded ]; then
            echo "No stacks collapsed — skipping flamegraph"
            mkdir -p flamegraph-output
            echo "No stacks captured" > flamegraph-output/status.txt
            exit 0
          fi
          mkdir -p flamegraph-output
          inferno-flamegraph < stacks.folded > flamegraph-output/flamegraph.svg 2>/dev/null
          echo "Flamegraph generated: $(wc -c < flamegraph-output/flamegraph.svg) bytes"

      - name: Upload flamegraph artifact
        uses: actions/upload-artifact@v4
        with:
          name: flamegraph
          path: flamegraph-output/
          if-no-files-found: warn
