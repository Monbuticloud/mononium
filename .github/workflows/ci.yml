name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Nightly flamegraph profiling
    - cron: '0 6 * * *'

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 3

jobs:
  # ── Lint ───────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets 2>&1 | tee clippy_output.txt

      - name: Clippy (tests)
        run: cargo clippy --all-targets --tests 2>&1 | tee clippy_tests_output.txt

  # ── License & Advisory ─────────────────────────────────────────────
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: License + advisory check
        run: cargo deny check

  # ── Test ───────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo nextest run --workspace --profile ci

  # ── Build (release) ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --workspace --release

      - name: Check binary
        run: ./target/release/monium-cli --help

  # ── Benchmarks ──────────────────────────────────────────────────────
  benches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Run criterion benchmarks
        run: cargo bench -p mononium-lib 2>&1 | tee bench_output.txt

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/criterion/
            bench_output.txt
          if-no-files-found: warn

  # ── Flamegraph (Linux perf) ─────────────────────────────────────────
  # Scheduled nightly + manual trigger. Builds node + benches with debug
  # symbols and frame pointers, then profiles both under perf.
  #
  # PRIMARY: benchmarks — guaranteed CPU work (crypto, consensus, storage)
  # SECONDARY: node — captures live activity when there's p2p traffic
  #
  # Uses prime Hz (3989) for sampling and DWARF call-graph unwinding.
  flamegraph:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq linux-tools-common linux-tools-$(uname -r) 2>/dev/null || true
          cargo install inferno --quiet 2>/dev/null

      - name: Build with debug symbols + frame pointers (node + benches)
        run: |
          RUSTFLAGS="-C force-frame-pointers=y" cargo build --profile flamegraph --bin mononium-cli
          RUSTFLAGS="-C force-frame-pointers=y" cargo build --profile flamegraph --benches -p mononium-lib

      - name: Profile consensus benchmarks (PRIMARY — guaranteed CPU work)
        run: |
          sudo sysctl -w kernel.perf_event_paranoid=1 2>/dev/null || true

          # Find the consensus bench binary built with flamegraph profile
          BENCH_BIN=$(find target/flamegraph -executable -name 'consensus-*' -type f ! -name '*.d' 2>/dev/null | head -1)
          if [ -z "$BENCH_BIN" ]; then
            echo "No consensus bench binary found — listing candidates:"
            find target/flamegraph -executable -name '*consensus*' -type f 2>/dev/null | head -10
            find target/flamegraph -executable -type f 2>/dev/null | head -20
            exit 1
          fi

          echo "Profiling: $BENCH_BIN"
          sudo perf record -F 3989 --call-graph dwarf -o perf.bench.data -- "$BENCH_BIN" --bench 2>&1
          sudo chown "$(whoami)" perf.bench.data 2>/dev/null || true
          ls -lh perf.bench.data

      - name: Generate benchmark flamegraph
        run: |
          mkdir -p flamegraph-output
          perf script -i perf.bench.data 2>/dev/null | inferno-collapse-perf > bench-stacks.folded 2>/dev/null || true
          STACKS=$(wc -l < bench-stacks.folded 2>/dev/null || echo 0)
          echo "Bench stacks: $STACKS"
          if [ "$STACKS" -gt 0 ] 2>/dev/null; then
            inferno-flamegraph < bench-stacks.folded > flamegraph-output/bench-flamegraph.svg 2>/dev/null
            echo "Bench flamegraph: $(wc -c < flamegraph-output/bench-flamegraph.svg) bytes"
          else
            echo "No bench stacks — dumping perf report for diagnostics:"
            perf report -i perf.bench.data --stdio --no-children 2>/dev/null | head -60 || true
            echo "(empty)" > flamegraph-output/bench-flamegraph.svg
          fi

      - name: Profile node (SECONDARY — captures live activity)
        run: |
          # Start node in background (observer mode, no p2p needed)
          ./target/flamegraph/mononium-cli node \
            --observer \
            --genesis configs/genesis.devnet.json \
            --p2p-port 0 \
            --rpc-port 0 \
            --rest-port 0 \
            --log-level error &
          NODE_PID=$!
          echo "Node PID: $NODE_PID"
          sleep 5

          if ! kill -0 "$NODE_PID" 2>/dev/null; then
            echo "Node died before sampling — skipping"
            exit 0
          fi

          echo "Sampling node (60s)..."
          sudo perf record -F 3989 --call-graph dwarf -p "$NODE_PID" -o perf.node.data -- sleep 60 2>&1
          sudo chown "$(whoami)" perf.node.data 2>/dev/null || true

          kill "$NODE_PID" 2>/dev/null || true
          wait "$NODE_PID" 2>/dev/null || true
          ls -lh perf.node.data

      - name: Generate node flamegraph
        run: |
          if [ -f perf.node.data ] && [ -s perf.node.data ]; then
            perf script -i perf.node.data 2>/dev/null | inferno-collapse-perf > node-stacks.folded 2>/dev/null || true
            STACKS=$(wc -l < node-stacks.folded 2>/dev/null || echo 0)
            echo "Node stacks: $STACKS"
            if [ "$STACKS" -gt 0 ] 2>/dev/null; then
              inferno-flamegraph < node-stacks.folded > flamegraph-output/node-flamegraph.svg 2>/dev/null
              echo "Node flamegraph: $(wc -c < flamegraph-output/node-flamegraph.svg) bytes"
            fi
          fi

      - name: Upload flamegraph artifact
        uses: actions/upload-artifact@v4
        with:
          name: flamegraph
          path: flamegraph-output/
          if-no-files-found: warn
