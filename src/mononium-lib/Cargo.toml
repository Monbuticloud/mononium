[package]
name = "mononium-lib"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-only"

[dependencies]
# Workspace shared
serde.workspace = true
serde_json.workspace = true
parity-scale-codec.workspace = true
blake3.workspace = true
hex.workspace = true
subtle.workspace = true
primitive-types.workspace = true
redb.workspace = true
thiserror.workspace = true
tracing.workspace = true
async-trait.workspace = true
tokio.workspace = true
libp2p.workspace = true
libp2p-request-response.workspace = true

# Crypto crates (ADR-019)
falcon-rs = "0.2"
argon2 = "0.5"
chacha20poly1305 = "0.10"

# Config
serde_yaml.workspace = true
toml.workspace = true

# Compression
snap.workspace = true

# RPC
jsonrpsee.workspace = true
jsonrpsee-types.workspace = true

[features]
default = []
gui = []

[dev-dependencies]
tempfile = "3"
criterion.workspace = true
proptest.workspace = true

[lints]
workspace = true

# ---------------------------------------------------------------------------
# Benchmarks — each criterion target needs harness = false so it uses
# its own main() (generated by criterion_main!()) instead of the test runner.
# ---------------------------------------------------------------------------
[[bench]]
name = "consensus"
harness = false

[[bench]]
name = "crypto"
harness = false

[[bench]]
name = "network"
harness = false

[[bench]]
name = "state"
harness = false

[[bench]]
name = "storage"
harness = false
